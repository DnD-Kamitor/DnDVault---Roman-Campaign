project:
  type: book
  output-dir: _book

book:
  title: "The Shadow of Mars"
  subtitle: "A Roman Campaign in Five Acts"
  author: "Campaign Module"
  date: "2026-01-18"
  repo-url: https://github.com/DnD-Kamitor/DnDVault---Roman-Campaign
  repo-actions: [issue]
  chapters:
    - index.qmd
    - part: "Player's Workbook"
      chapters:
        - player_intro.qmd
        - session0.qmd
        - player_guide.qmd
    - part: "GM's Workbook"
      chapters:
        - gm_intro.qmd
        - chapter1.qmd
        - chapter2.qmd
        - chapter3.qmd
        - chapter4.qmd
        - chapter5.qmd
        - roman_tactics.qmd
        - appendix.qmd

format:
  html:
    theme:
      light: flatly
      dark: darkly
    highlight-style: atom-one
    code-copy: true
    toc: true
    toc-depth: 3
    number-sections: false
  pdf:
    documentclass: scrreprt
    geometry: "letterpaper,margin=1in"
    toc: true
    number-sections: false
